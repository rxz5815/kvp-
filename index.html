<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebNav Hub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <div id="bg-canvas"></div>
  <div class="wrapper">
    <header>
      <a href="/" class="logo-link"><h1>WebNav Hub</h1></a>
      <div class="search-area main-search">
        <div class="search-tabs">
          <div class="tab" data-type="internal">站内</div>
          <div class="tab active" data-type="web">搜索</div>
        </div>
        <div class="search-pill">
          <input type="text" class="search-input" placeholder="百度一下" autocomplete="off">
          <button class="search-trigger-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="search-engines">
          <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
          <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
          <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
        </div>
      </div>
    </header>
    <nav id="sticky-nav"><ul id="category-ul"></ul></nav>
    <main id="main-content"></main>
  </div>

  <div class="side-tools">
    <button class="side-btn" id="btn-top" style="display:none;"><i class="fas fa-arrow-up"></i></button>
    <button class="side-btn" id="btn-float-search" style="display:none;"><i class="fas fa-search"></i></button>
    <button class="side-btn" id="btn-add-site"><i class="fas fa-plus"></i></button>
    <button class="side-btn" id="btn-toggle-bg"><i class="fas fa-palette"></i></button>
    <button class="side-btn" id="btn-random-bg"><i class="fas fa-image"></i></button>
    <button class="side-btn" id="btn-cat-admin"><i class="fas fa-folder"></i></button>
  </div>

  <!-- 搜索弹窗 -->
  <div class="modal" id="modal-search">
    <div class="modal-overlay"></div>
    <div class="modal-body search-modal-container">
      <div class="search-area modal-inner-search">
        <div class="search-tabs">
          <div class="tab" data-type="internal">站内</div>
          <div class="tab active" data-type="web">搜索</div>
        </div>
        <div class="search-pill">
          <input type="text" class="search-input" placeholder="百度一下">
          <button class="search-trigger-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="search-engines">
          <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
          <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
          <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
        </div>
      </div>
      <!-- 弹窗内搜索结果区 -->
      <div id="modal-results-area" class="link-grid"></div>
    </div>
  </div>

  <!-- 编辑站点 -->
  <div class="modal" id="modal-link">
    <div class="modal-overlay"></div>
    <div class="modal-body modern-modal">
      <h3 class="modal-title-center">编辑站点</h3>
      <form id="link-form">
        <input type="password" name="password" id="main-pwd" placeholder="管理密码" class="full-width-input">
        <div class="modal-row custom-row-align">
            <input type="text" name="category" id="in-cat" placeholder="分类名称" required>
            <select id="cat-hint"></select>
        </div>
        <input type="text" name="title" id="in-title" placeholder="站点标题" class="full-width-input" required>
        <div class="modal-row custom-row-align">
            <input type="url" name="url" id="in-url" placeholder="https://..." required>
            <div class="icon-preview-box"><img id="prev-img" src=""></div>
        </div>
        <button type="submit" class="save-btn-new">保存站点</button>
      </form>
    </div>
  </div>

  <!-- 分类管理 -->
  <div class="modal" id="modal-cat">
    <div class="modal-overlay"></div>
    <div class="modal-body modern-modal">
      <h3 class="modal-title-center">分类管理 (拖拽排序)</h3>
      <div id="cat-list-box" class="scroll-area"></div>
      <div class="add-cat-area">
          <input type="text" id="new-cat-input" placeholder="新分类名称">
          <button class="btn-add-cat" onclick="addNewCategory()">+ 添加</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
