<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebNav Hub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <div id="bg-canvas"></div>

  <div class="wrapper">
    <header>
      <h1>WebNav Hub</h1>
      <div class="search-main-box">
        <div class="search-tabs">
          <div class="tab" data-type="internal">站内</div>
          <div class="tab active" data-type="web">搜索</div>
        </div>
        <div class="search-bar">
          <input type="text" class="search-input" placeholder="百度一下" autocomplete="off">
          <button class="search-trigger"><i class="fas fa-search"></i></button>
        </div>
        <div class="search-engines">
          <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
          <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
          <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
        </div>
      </div>
    </header>
    <nav id="nav-bar"><ul></ul></nav>
    <main id="main-content"></main>
  </div>

  <div class="side-toolbar">
    <button class="side-btn" id="btn-top" style="display:none;"><i class="fas fa-chevron-up"></i></button>
    <button class="side-btn" id="btn-float-search" style="display:none;"><i class="fas fa-search"></i></button>
    <button class="side-btn" id="btn-add-site"><i class="fas fa-plus"></i></button>
    <button class="side-btn" id="btn-toggle-grad" title="切换渐变"><i class="fas fa-palette"></i></button>
    <button class="side-btn" id="btn-random-bg" title="随机背景"><i class="fas fa-image"></i></button>
    <button class="side-btn" id="btn-manage-cat"><i class="fas fa-folder"></i></button>
  </div>

  <div class="modal" id="modal-search">
    <div class="modal-overlay"></div>
    <div class="modal-body search-modal-body">
        <div class="search-bar">
            <input type="text" class="search-input" placeholder="快速检索书签...">
            <button class="search-trigger"><i class="fas fa-search"></i></button>
        </div>
    </div>
  </div>

  <div class="modal" id="modal-link">
    <div class="modal-overlay"></div>
    <div class="modal-body">
      <span class="close-btn">&times;</span>
      <h3>编辑站点</h3>
      <form id="link-form">
        <input type="password" name="password" id="main-pwd" placeholder="管理密码" required>
        <div class="input-row">
          <input type="text" name="category" id="in-cat" placeholder="分类名称" required>
          <select id="cat-hint" onchange="document.getElementById('in-cat').value=this.value"></select>
        </div>
        <input type="text" name="title" id="in-title" placeholder="站点标题" required>
        <div class="url-input-wrap">
            <input type="url" name="url" id="in-url" placeholder="https://..." required>
            <div class="url-icon-preview"><img id="prev-img" src=""><i id="prev-fa" class="fas fa-globe"></i></div>
        </div>
        <input type="text" name="fa_icon" id="in-fa" placeholder="备用图标 (如: fab fa-github)">
        <button type="submit" class="save-btn-premium">保存站点</button>
      </form>
    </div>
  </div>

  <div class="modal" id="modal-cat">
    <div class="modal-overlay"></div>
    <div class="modal-body">
      <span class="close-btn">&times;</span>
      <h3>分类管理</h3>
      <div id="cat-list-container"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
