<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebNav Hub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
  <div id="bg-canvas"></div>

  <div class="container">
    <header id="main-header">
      <h1>WebNav Hub</h1>
      <!-- 顶部主搜索栏 -->
      <div class="search-wrapper main-search">
        <div class="search-tabs">
          <div class="tab" data-type="internal">站内</div>
          <div class="tab active" data-type="web">搜索</div>
        </div>
        <div class="search-input-group">
          <input type="text" class="search-input" placeholder="百度一下" autocomplete="off">
          <button class="search-trigger"><i class="fas fa-search"></i></button>
        </div>
        <div class="search-engines">
          <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
          <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
          <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
          <span class="engine" data-url="https://www.zhihu.com/search?q=">知乎</span>
        </div>
      </div>
    </header>

    <nav><ul id="category-nav"></ul></nav>
    <main id="main-content"></main>
  </div>

  <!-- 右侧工具栏 -->
  <div class="side-tools">
    <button class="tool-btn" id="float-search-btn" title="快速搜索" style="display:none;"><i class="fas fa-search"></i></button>
    <button class="tool-btn" id="btn-add" title="添加站点"><i class="fas fa-plus"></i></button>
    <button class="tool-btn" id="btn-bg" title="更换背景"><i class="fas fa-image"></i></button>
    <button class="tool-btn" id="btn-cat" title="分类管理"><i class="fas fa-folder-open"></i></button>
  </div>

  <!-- 弹窗搜索框 (向下拉时通过侧边栏触发) -->
  <div class="modal" id="modal-search">
    <div class="modal-content search-modal-content">
        <div class="search-wrapper">
            <div class="search-tabs">
              <div class="tab" data-type="internal">站内</div>
              <div class="tab active" data-type="web">搜索</div>
            </div>
            <div class="search-input-group">
              <input type="text" class="search-input" placeholder="百度一下" autocomplete="off">
              <button class="search-trigger"><i class="fas fa-search"></i></button>
            </div>
            <div class="search-engines">
              <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
              <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
              <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
            </div>
        </div>
    </div>
  </div>

  <!-- 站点编辑弹窗 -->
  <div class="modal" id="modal-link">
    <div class="modal-content">
      <div class="modal-header"><h3>编辑站点</h3><span class="close">&times;</span></div>
      <form id="form-link">
        <input type="password" name="password" placeholder="管理密码" required>
        <select name="category" id="select-category" required></select>
        <input type="text" name="title" id="in-title" placeholder="站点名称" required>
        <input type="url" name="url" id="in-url" placeholder="URL (https://...)" required>
        <div class="icon-preview-row">
            <img id="icon-preview" src="">
            <span>图标预览</span>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn-save">保存</button>
            <button type="button" class="btn-del" id="btn-delete-link">删除</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
