<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebNav Hub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
  <div id="bg-canvas"></div>

  <div class="container">
    <header>
      <h1>WebNav Hub</h1>
      <div class="search-wrapper">
        <div class="search-tabs">
          <span class="search-tab" data-type="internal">站内</span>
          <span class="search-tab active" data-type="web">搜索</span>
        </div>
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="百度一下" autocomplete="off">
          <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="search-engines" id="engines-list">
          <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
          <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
          <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
        </div>
      </div>
    </header>

    <nav id="category-nav"></nav>
    <main id="main-content"></main>
  </div>

  <!-- 侧边工具栏 (需求1: 悬停不缩回) -->
  <div class="side-tools">
    <button class="tool-btn" id="btn-top" title="回到顶部"><i class="fas fa-arrow-up"></i></button>
    <button class="tool-btn" id="float-search-btn" style="display:none;"><i class="fas fa-search"></i></button>
    <button class="tool-btn" id="btn-add"><i class="fas fa-plus"></i></button>
    
    <div class="bg-tool-wrapper">
        <button class="tool-btn bg-main-icon"><i class="fas fa-image"></i></button>
        <div class="bg-sub-panel">
            <div class="bg-item" onclick="setBg('grey')" title="谷歌灰"><i class="fas fa-circle" style="color:#202124"></i></div>
            <div class="bg-item" onclick="setBg('gradient1')" title="极光紫"><i class="fas fa-fill-drip"></i></div>
            <div class="bg-item" onclick="setBg('gradient2')" title="深海蓝"><i class="fas fa-swatchbook"></i></div>
            <div class="bg-item" onclick="setBg('random')" title="随机风景"><i class="fas fa-random"></i></div>
            <div class="bg-item" onclick="setBg('custom')" title="自定义图片"><i class="fas fa-link"></i></div>
        </div>
    </div>
    
    <button class="tool-btn" id="btn-cat"><i class="fas fa-folder-open"></i></button>
  </div>

  <!-- 站点编辑弹窗 -->
  <div class="modal" id="modal-link">
    <div class="modal-content">
      <div class="modal-header"><h3>编辑站点</h3><span class="close">&times;</span></div>
      <form id="form-link">
        <input type="password" name="password" placeholder="管理员密码" required>
        <div class="input-row">
            <input type="text" name="category" id="in-cat" placeholder="分类 (如: ai-search)" required>
            <select id="select-cat-hint" onchange="document.getElementById('in-cat').value=this.value">
                <option value="">快速选择分类</option>
            </select>
        </div>
        <input type="text" name="title" id="in-title" placeholder="网站名称" required>
        <input type="url" name="url" id="in-url" placeholder="URL (https://...)" required>
        <div class="icon-preview-row">
            <img id="icon-preview" src="">
            <span>图标预览 (自动获取)</span>
        </div>
        <button type="submit" class="btn-save">保存站点</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
