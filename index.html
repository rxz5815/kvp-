<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebNav Hub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <div id="bg-canvas"></div>

  <div class="wrapper">
    <header>
      <h1>WebNav Hub</h1>
      <!-- 主搜索 -->
      <div class="search-container main-search">
        <div class="search-tabs">
          <div class="tab" data-type="internal">站内</div>
          <div class="tab active" data-type="web">搜索</div>
        </div>
        <div class="search-pill">
          <input type="text" class="search-input" placeholder="百度一下" autofocus autocomplete="off">
          <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="search-engines">
          <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
          <span class="engine" data-url="https://www.google.com/search?q=">Google</span>
          <span class="engine" data-url="https://www.bing.com/search?q=">Bing</span>
        </div>
      </div>
    </header>

    <nav id="sticky-nav"><ul id="category-ul"></ul></nav>
    <main id="main-content"></main>
  </div>

  <!-- 侧边栏 -->
  <div class="side-tools">
    <button class="tool-icon" id="btn-top" style="display:none;"><i class="fas fa-chevron-up"></i></button>
    <button class="tool-icon" id="btn-float-search" style="display:none;"><i class="fas fa-search"></i></button>
    <button class="tool-icon" id="btn-add-site"><i class="fas fa-plus"></i></button>
    <button class="tool-icon" id="btn-toggle-bg"><i class="fas fa-palette"></i></button>
    <button class="tool-icon" id="btn-random-bg"><i class="fas fa-image"></i></button>
    <button class="tool-icon" id="btn-cat-admin"><i class="fas fa-folder"></i></button>
  </div>

  <!-- 统一搜索弹窗 -->
  <div class="modal" id="modal-search">
    <div class="modal-overlay"></div>
    <div class="modal-body search-modal-body">
      <div class="search-container">
        <div class="search-tabs">
          <div class="tab" data-type="internal">站内</div>
          <div class="tab active" data-type="web">搜索</div>
        </div>
        <div class="search-pill">
          <input type="text" class="search-input" placeholder="快速检索书签...">
          <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑站点弹窗 -->
  <div class="modal" id="modal-link">
    <div class="modal-overlay"></div>
    <div class="modal-body modern-modal">
      <span class="close-modal">&times;</span>
      <h3>编辑站点</h3>
      <form id="link-form">
        <div id="pwd-wrap"><input type="password" name="password" id="main-pwd" placeholder="管理密码"></div>
        <div class="modal-row">
            <input type="text" name="category" id="in-cat" placeholder="分类名称" required>
            <select id="cat-hint" onchange="document.getElementById('in-cat').value=this.value"></select>
        </div>
        <input type="text" name="title" id="in-title" placeholder="站点标题" required>
        <div class="modal-row url-row">
            <input type="url" name="url" id="in-url" placeholder="https://..." required>
            <div class="icon-box"><img id="prev-img" src=""><i class="fas fa-globe" id="def-icon"></i></div>
        </div>
        <button type="submit" class="save-btn-new">保存站点</button>
      </form>
    </div>
  </div>

  <!-- 分类管理弹窗 -->
  <div class="modal" id="modal-cat">
    <div class="modal-overlay"></div>
    <div class="modal-body modern-modal">
      <span class="close-modal">&times;</span>
      <h3>分类管理</h3>
      <div id="cat-list-box"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
